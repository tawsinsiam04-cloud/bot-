services:
  - type: web
    name: bot
    runtime: python39
    region: oregon
    plan: free
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 1 --threads 4
    envVars:
      - key: TELEGRAM_TOKEN
        scope: runtime
      - key: TELEGRAM_CHAT_ID
        scope: runtime
